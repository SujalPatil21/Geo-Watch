spring.application.name=Women-Safety
spring.datasource.url=jdbc:postgresql://localhost:5433/crowd_safety
spring.datasource.username=postgres
spring.datasource.password=postgre

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.generate_statistics=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

server.address=0.0.0.0
server.port=8082

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.metrics.enabled=true

# CORS and WebSockets Allowed Origins Configuration
frontend.allowed-origins=${FRONTEND_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080,https://geo-watch.pages.dev}