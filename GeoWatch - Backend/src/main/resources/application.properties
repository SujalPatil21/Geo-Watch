spring.application.name=Women-Safety

# =========================================================
# DATABASE CONFIGURATION
# =========================================================

spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

# =========================================================
# JPA / HIBERNATE
# =========================================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.generate_statistics=true

# Hibernate auto-detects PostgreSQL dialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# =========================================================
# SERVER CONFIGURATION
# =========================================================

server.address=0.0.0.0
server.port=${PORT:8080}

# =========================================================
# ACTUATOR / OBSERVABILITY
# =========================================================

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.metrics.enabled=true

# =========================================================
# CORS / FRONTEND CONFIGURATION
# =========================================================

frontend.allowed-origins=${FRONTEND_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080,https://geo-watch.pages.dev}

# =========================================================
# HIKARI CONNECTION POOL
# =========================================================

spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
